<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault-Tec Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="menu-toggle" aria-label="Toggle menu">☰</button>
      <h1 id="logo">Vault-Tec Companion</h1>
      <div id="search-container">
        <input type="search" id="search-input" placeholder="Search..." autocomplete="off">
        <div id="search-results" class="hidden"></div>
      </div>
    </header>

    <div id="layout">
      <div id="sidebar-backdrop"></div>
      <nav id="sidebar" class="hidden">
        <ul id="nav-list">
          <li class="nav-group-header">Equipment Registry</li>
          <li><a href="#home" data-nav="home">Dashboard</a></li>
          <li><a href="#weapons" data-nav="weapons">Weapons</a></li>
          <li><a href="#armor" data-nav="armor">Armor</a></li>
          <li><a href="#consumables" data-nav="consumables">Consumables</a></li>

          <li class="nav-group-header">Personnel File</li>
          <li><a href="#perks" data-nav="perks">Perks</a></li>
          <li><a href="#skills" data-nav="skills">Skills</a></li>

          <li class="nav-group-header">Workshop</li>
          <li><a href="#crafting" data-nav="crafting">Crafting</a></li>
          <li><a href="#effects" data-nav="effects">Effects</a></li>
        </ul>
      </nav>

      <main id="content">
        <div id="loading">Loading Vault-Tec data...</div>
      </main>
    </div>
    <a href="#home" id="home-btn" class="home-btn">⌂ HOME</a>
  </div>

  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
